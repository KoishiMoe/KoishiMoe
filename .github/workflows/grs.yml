name: Update README cards

on:
  push:
    branches:
  schedule:
    - cron: "14 5 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca
        with:
          card: stats
          options: username=${{ github.repository_owner }}&owner=KoishiMoe,lolicode-org&show_icons=true&theme=vue&bg_color=00000000
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&owner=KoishiMoe,lolicode-org&theme=vue&bg_color=00000000
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
